<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓄電池用地 営業ボード｜関東</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --ink:#1E2B27;
  --ink-sub:#5C6B66;
  --paper:#F3F5F2;
  --card:#FFFFFF;
  --line:#DDE4DF;
  --pine:#14463A;      /* ヘッダー・基調 */
  --pine-deep:#0D332A;
  --volt:#F0B429;      /* 充電アンバー（アクセント） */
  --volt-soft:#FBEED0;
  --st-none:#9AA5A1;
  --st-intro:#3B82C4;
  --st-nego:#E8A93C;
  --st-apply:#E2703A;
  --st-won:#2F9E63;
  --st-lost:#5B5B66;
  --radius:10px;
  font-size:15px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",Meiryo,system-ui,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.55;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:.92rem}

/* ===== ヘッダー ===== */
header{
  background:linear-gradient(135deg,var(--pine-deep),var(--pine) 70%);
  color:#F4F7F3;padding:14px 20px 0;position:sticky;top:0;z-index:1100;
  box-shadow:0 2px 10px rgba(13,51,42,.25);
}
.hd-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hd-title{display:flex;align-items:center;gap:10px}
.hd-batt{width:34px;height:18px;border:2px solid var(--volt);border-radius:4px;position:relative;display:inline-block}
.hd-batt::after{content:"";position:absolute;right:-6px;top:4px;width:4px;height:6px;background:var(--volt);border-radius:0 2px 2px 0}
.hd-batt i{position:absolute;left:2px;top:2px;bottom:2px;width:70%;background:var(--volt);border-radius:2px;animation:charge 3s ease-in-out infinite}
@keyframes charge{0%,100%{width:35%}50%{width:88%}}
@media (prefers-reduced-motion:reduce){.hd-batt i{animation:none;width:70%}}
h1{font-size:1.15rem;font-weight:700;letter-spacing:.03em}
.hd-sub{font-size:.75rem;opacity:.75;letter-spacing:.05em}
.hd-spacer{flex:1}
.mode-toggle{
  display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:6px 14px;
  color:#fff;font-size:.85rem;font-weight:600;transition:.2s;
}
.mode-toggle.on{background:var(--volt);color:var(--pine-deep);border-color:var(--volt)}
.tabs{display:flex;gap:4px;margin-top:12px}
.tab{
  background:transparent;border:none;color:rgba(255,255,255,.65);
  padding:9px 18px;font-size:.92rem;font-weight:600;border-radius:8px 8px 0 0;
}
.tab.act{background:var(--paper);color:var(--pine)}
.cust-banner{
  display:none;background:var(--volt);color:var(--pine-deep);text-align:center;
  font-size:.8rem;font-weight:700;padding:5px;letter-spacing:.08em;
}
body.customer .cust-banner{display:block}
body.customer .internal{display:none !important}

/* ===== フィルタ ===== */
.filters{
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding:12px 20px;background:var(--card);border-bottom:1px solid var(--line);
}
.filters select,.filters input[type=text]{
  padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;min-width:120px;
}
.filters input[type=text]{min-width:180px}
.f-count{margin-left:auto;font-size:.85rem;color:var(--ink-sub);font-weight:600}

/* ===== ビュー ===== */
main{padding:0}
.view{display:none}
.view.act{display:block}

/* --- 地図 --- */
#mapWrap{position:relative}
#map{height:calc(100vh - 205px);min-height:440px}
.map-tools{
  position:absolute;top:12px;right:12px;z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:flex-end;
}
.map-btn{
  background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 12px;
  font-size:.82rem;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.15);color:var(--ink);
}
.map-btn.on{background:var(--pine);color:#fff;border-color:var(--pine)}
.geo-status{
  position:absolute;bottom:14px;left:12px;z-index:1000;background:rgba(255,255,255,.95);
  border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:.8rem;box-shadow:0 1px 4px rgba(0,0,0,.12);
}
.legend{
  position:absolute;bottom:14px;right:12px;z-index:1000;background:rgba(255,255,255,.95);
  border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:.78rem;box-shadow:0 1px 4px rgba(0,0,0,.12);
}
.legend div{display:flex;align-items:center;gap:6px;margin:2px 0}
.dot{width:11px;height:11px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
.leaflet-popup-content{font-size:.85rem;min-width:230px}
.pp-name{font-weight:700;font-size:.92rem;margin-bottom:4px;color:var(--pine)}
.pp-row{display:flex;justify-content:space-between;gap:10px;padding:2px 0;border-bottom:1px dashed var(--line)}
.pp-row b{font-weight:600;color:var(--ink-sub);white-space:nowrap}
.pp-links{margin-top:8px;display:flex;gap:8px}
.pp-links a{color:var(--pine);font-weight:600}
.approx{font-size:.72rem;color:#B0722A;margin-top:6px}

/* --- 一覧 --- */
#listWrap{padding:16px 20px;overflow-x:auto}
.list-tools{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tool-btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:600}
.tool-btn:hover{border-color:var(--pine);color:var(--pine)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 4px rgba(20,70,58,.07)}
th{background:var(--pine);color:#fff;font-size:.78rem;font-weight:600;padding:9px 10px;text-align:left;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--line);font-size:.84rem;vertical-align:top}
tr:hover td{background:#F6FAF7}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.site-name{font-weight:700;color:var(--pine);cursor:pointer}
.site-name:hover{text-decoration:underline}
.addr{color:var(--ink-sub);font-size:.78rem}
.phase{font-size:.74rem;background:#EDF3EF;border-radius:6px;padding:2px 7px;white-space:nowrap;display:inline-block;margin:1px 0}
td select{padding:4px 6px;border:1px solid var(--line);border-radius:6px;font-weight:600}
td input[type=text]{padding:4px 6px;border:1px solid var(--line);border-radius:6px;width:110px}
td .memo{width:170px}

/* 電池ゲージ（商談ステータス表示） */
.gauge{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.batt{width:30px;height:14px;border:1.5px solid var(--ink-sub);border-radius:3px;position:relative;display:inline-flex;gap:1px;padding:1.5px}
.batt::after{content:"";position:absolute;right:-4px;top:3.5px;width:3px;height:5px;background:var(--ink-sub);border-radius:0 1px 1px 0}
.batt s{flex:1;border-radius:1px;background:#E3E8E4;text-decoration:none}
.st-tag{font-size:.76rem;font-weight:700}

/* --- ダッシュボード --- */
#dashWrap{padding:20px;max-width:1080px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:0 1px 4px rgba(20,70,58,.07);border-top:3px solid var(--pine)}
.kpi .lbl{font-size:.75rem;color:var(--ink-sub);font-weight:600;letter-spacing:.04em}
.kpi .val{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
.kpi .unit{font-size:.8rem;color:var(--ink-sub);font-weight:600}
.panel{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 1px 4px rgba(20,70,58,.07);margin-bottom:14px}
.panel h3{font-size:.95rem;color:var(--pine);margin-bottom:10px;border-left:4px solid var(--volt);padding-left:8px}
.bar-row{display:grid;grid-template-columns:90px 1fr 90px;gap:10px;align-items:center;margin:6px 0;font-size:.84rem}
.bar-bg{background:#EDF1EE;border-radius:6px;height:16px;overflow:hidden}
.bar{height:100%;border-radius:6px}
.bar-val{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink-sub)}

footer{padding:14px 20px 30px;font-size:.75rem;color:var(--ink-sub);text-align:center}

/* ===== シミュレーション提案シート ===== */
#simOverlay{
  display:none;position:fixed;inset:0;z-index:2000;background:rgba(20,35,30,.55);
  overflow:auto;padding:24px 10px;
}
#simOverlay.open{display:block}
.sim-tools{max-width:210mm;margin:0 auto 10px;display:flex;gap:8px;justify-content:flex-end}
.sim-btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 16px;font-weight:700;font-size:.85rem}
.sim-btn.pri{background:var(--volt);border-color:var(--volt);color:var(--pine-deep)}
.sheet{
  background:#fff;width:210mm;min-height:297mm;margin:0 auto;padding:13mm 14mm;
  box-shadow:0 4px 24px rgba(0,0,0,.35);color:var(--ink);font-size:9.5pt;
}
.sh-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--pine);padding-bottom:6px}
.sh-head .t1{font-size:8pt;letter-spacing:.2em;color:var(--pine);font-weight:700}
.sh-head h2{font-size:15pt;color:var(--pine);letter-spacing:.02em}
.sh-head .brand{text-align:right;font-size:8pt;color:var(--ink-sub);line-height:1.4}
.sh-head .brand b{color:var(--pine);font-size:10pt;letter-spacing:.1em}
.sh-prop{display:flex;gap:14px;flex-wrap:wrap;background:#F2F6F3;border-radius:6px;padding:7px 12px;margin:8px 0;font-size:9pt}
.sh-prop b{color:var(--ink-sub);font-weight:600;margin-right:5px}
.sh-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0}
.sh-kpi{border:1px solid var(--line);border-top:3px solid var(--pine);border-radius:6px;padding:7px 9px}
.sh-kpi.gold{border-top-color:var(--volt)}
.sh-kpi .l{font-size:7.5pt;color:var(--ink-sub);font-weight:700}
.sh-kpi .v{font-size:13.5pt;font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px}
.sh-kpi .u{font-size:8pt;color:var(--ink-sub);font-weight:600}
.sh-sec{font-size:10pt;color:var(--pine);font-weight:700;border-left:4px solid var(--volt);padding-left:7px;margin:10px 0 5px}
.sh-assump{font-size:8pt;color:var(--ink-sub);line-height:1.6;background:#FBFCFB;border:1px solid var(--line);border-radius:6px;padding:6px 10px}
#simChart{width:100%;height:auto;display:block;margin:2px 0}
table.sh-tbl{width:100%;border-collapse:collapse;font-size:8pt}
.sh-tbl th{background:var(--pine);color:#fff;padding:3.5pt 5pt;font-weight:600;text-align:right;white-space:nowrap}
.sh-tbl th:first-child{text-align:left}
.sh-tbl td{padding:3pt 5pt;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.sh-tbl td:first-child{text-align:left;font-weight:600}
.sh-tbl tr.total td{background:var(--volt-soft);font-weight:700;border-top:2px solid var(--volt)}
.sh-tbl td.neg{color:#B4432E}
.sh-tbl td.pos{color:#1E7A4C}
.sh-note{font-size:7pt;color:var(--ink-sub);margin-top:8px;line-height:1.6;border-top:1px solid var(--line);padding-top:5px}

@media print{
  @page{size:A4;margin:0}
  body *{visibility:hidden}
  #simOverlay,#simOverlay *{visibility:visible}
  #simOverlay{position:absolute;inset:0;background:#fff;padding:0;overflow:visible}
  .sim-tools{display:none}
  .sheet{box-shadow:none;width:auto;min-height:auto;margin:0}
}
@media(max-width:820px){.sheet{width:100%;min-height:auto;padding:16px}.sh-kpis{grid-template-columns:repeat(2,1fr)}}

@media(max-width:700px){
  #map{height:calc(100vh - 250px)}
  .filters select{min-width:100px}
  td .memo{width:120px}
}
</style>
</head>
<body>

<header>
  <div class="hd-top">
    <div class="hd-title">
      <span class="hd-batt"><i></i></span>
      <div>
        <h1>蓄電池用地 営業ボード｜関東</h1>
        <div class="hd-sub">EARTHCOM ｜ 低圧蓄電池用地 パイプライン管理・物件マップ</div>
      </div>
    </div>
    <div class="hd-spacer"></div>
    <button class="mode-toggle" id="custToggle" onclick="toggleCustomer()">
      <span id="custIcon">🔒</span><span id="custLabel">社内モード</span>
    </button>
  </div>
  <nav class="tabs">
    <button class="tab act" data-v="map" onclick="switchView('map')">🗾 地図</button>
    <button class="tab" data-v="list" onclick="switchView('list')">📋 一覧</button>
    <button class="tab internal" data-v="dash" onclick="switchView('dash')">📊 ダッシュボード</button>
  </nav>
</header>
<div class="cust-banner">お客様提示モード ─ 社内情報（担当・仕入価格・粗利・商談メモ）は非表示です</div>

<div class="filters">
  <select id="fPref" onchange="render()"><option value="">都道府県：すべて</option></select>
  <select id="fOwner" class="internal" onchange="render()"><option value="">担当：すべて</option></select>
  <select id="fLand" onchange="render()"><option value="">土地フェーズ：すべて</option></select>
  <select id="fStatus" class="internal" onchange="render()"><option value="">商談：すべて</option></select>
  <input type="text" id="fKw" placeholder="物件名・所在地で検索" oninput="render()">
  <span class="f-count" id="fCount"></span>
</div>

<main>
  <section class="view act" id="v-map">
    <div id="mapWrap">
      <div id="map"></div>
      <div class="map-tools">
        <button class="map-btn" id="tileBtn" onclick="toggleTile()">🛰 航空写真</button>
        <button class="map-btn internal" id="fixBtn" onclick="toggleFix()">📍 位置修正モード</button>
        <button class="map-btn" onclick="fitAll()">⤢ 全体表示</button>
      </div>
      <div class="geo-status" id="geoStatus">位置情報を取得中…</div>
      <div class="legend" id="legend"></div>
    </div>
  </section>

  <section class="view" id="v-list">
    <div id="listWrap">
      <div class="list-tools internal">
        <button class="tool-btn" onclick="exportCSV()">⬇ CSV書き出し</button>
        <button class="tool-btn" onclick="exportJSON()">💾 商談データ書き出し</button>
        <button class="tool-btn" onclick="document.getElementById('impFile').click()">📂 商談データ読み込み</button>
        <input type="file" id="impFile" accept=".json" style="display:none" onchange="importJSON(event)">
      </div>
      <table id="tbl"></table>
    </div>
  </section>

  <section class="view" id="v-dash">
    <div id="dashWrap"></div>
  </section>
</main>

<footer>
  ピン位置は所在地から自動取得した概算です。正確な位置は各物件の「Googleマップ」リンク、または位置修正モードで調整してください。<br>
  商談ステータス・メモ・ピン修正はこの端末（ブラウザ）に保存されます。共有する場合は「商談データ書き出し」をご利用ください。
</footer>

<div id="simOverlay" onclick="if(event.target===this)closeSim()">
  <div class="sim-tools">
    <button class="sim-btn pri" onclick="window.print()">🖨 印刷 / PDF保存</button>
    <button class="sim-btn" onclick="closeSim()">✕ 閉じる</button>
  </div>
  <div class="sheet" id="simSheet"></div>
</div>

function simCalc(inv){
  const cum=[]; let c=-inv, be=null;
  SIM.net.forEach((n,i)=>{c+=n;cum.push(c);if(be===null&&c>=0)be=i;});
  const npv=r=>SIM.net.reduce((a,n,i)=>a+n/Math.pow(1+r,i+1),-inv);
  let lo=-0.9,hi=3;
  for(let i=0;i<200;i++){const m=(lo+hi)/2;(npv(m)>0)?lo=m:hi=m;}
  const totalNet=SIM.net.reduce((a,b)=>a+b,0);
  return {cum,be,irr:(lo+hi)/2,totalNet,finalCF:totalNet-inv,
    totalSales:SIM.sales.reduce((a,b)=>a+b,0),totalCost:SIM.cost.reduce((a,b)=>a+b,0)};
}

  const W=740,H=190,padL=58,padR=8,padT=14,padB=24;
  const vals=[-inv,...cum];
  const min=Math.min(...vals),max=Math.max(...vals),span=max-min||1;
  const x=i=>padL+(W-padL-padR)*i/(vals.length-1);
  const y=v=>padT+(H-padT-padB)*(1-(v-min)/span);
  const zero=y(0);
  let bars="",pts="";
  cum.forEach((v,i)=>{
    const xi=x(i+1),yi=y(v);
    const h=Math.abs(yi-zero)||1;
    bars+=`<rect x="${xi-9}" y="${Math.min(yi,zero)}" width="18" height="${h}" rx="2" fill="${v>=0?"#2F9E63":"#C9CFCB"}"/>`;
    pts+=`${xi},${yi} `;
    if(i%2===0||i===cum.length-1)bars+=`<text x="${xi}" y="${H-6}" font-size="8.5" text-anchor="middle" fill="#5C6B66">${SIM.years[i]}</text>`;
  });
  const yl=[max,0,min].map(v=>`<text x="${padL-6}" y="${y(v)+3}" font-size="8.5" text-anchor="end" fill="#5C6B66">${(v/1e4).toLocaleString(undefined,{maximumFractionDigits:0})}万</text>`).join("");
  return `<svg id="simChart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padL}" y1="${zero}" x2="${W-padR}" y2="${zero}" stroke="#1E2B27" stroke-width="1"/>
    ${bars}
    <polyline points="${pts}" fill="none" stroke="#14463A" stroke-width="2"/>
    ${yl}</svg>`;
}

function drawMarkers(){
  const list=filtered();
  const ids=new Set(list.map(s=>s.id));
  Object.entries(markers).forEach(([id,m])=>{ if(!ids.has(+id)){map.removeLayer(m);delete markers[id];} });
  list.forEach(s=>{
    const c=coordOf(s); if(!c) return;
    const col=markerColor(s);
    if(markers[s.id]){
      markers[s.id].setLatLng([c.lat,c.lng]);
      markers[s.id].setIcon(pinIcon(cssColor(col)));
      return;
    }
    const mk=L.marker([c.lat,c.lng],{draggable:false,icon:pinIcon(cssColor(col))}).addTo(map);
    mk.bindPopup(()=>popupHtml(s));
    mk.on("dragend",e=>{
      const ll=e.target.getLatLng();
      geoFix[s.id]={lat:ll.lat,lng:ll.lng};
      localStorage.setItem(LS_FIX,JSON.stringify(geoFix));
      mk.setPopupContent(popupHtml(s));
    });
    if(fixOn) mk.dragging.enable();
    markers[s.id]=mk;
  });
  updateGeoStatus();
}

  if(!v.startsWith("var(")) return v;

/* ================= ジオコーディング（国土地理院API） ================= */
function cleanAddr(a){
  return a.replace(/〒\d{3}-?\d{4}\s*/,"").replace(/\s+/g,"").split(/[、,]/)[0];
}
async function gsiSearch(q){
  const r=await fetch("https://msearch.gsi.go.jp/address-search/AddressSearch?q="+encodeURIComponent(q));
  const j=await r.json();
  if(j&&j.length){const[lng,lat]=j[0].geometry.coordinates;return{lat,lng};}
  return null;
}
async function geocodeAll(){
  const targets=SITES.filter(s=>!geoCache[s.address]&&!geoFix[s.id]);
  let done=SITES.length-targets.length;
  for(const s of targets){
    const base=cleanAddr(s.address);
    const cands=[base,
      base.replace(/[0-9０-９\-−ー番地の]+$/,""),
      base.replace(/字.*$/,"")];
    let hit=null;
    for(const q of cands){ if(!q)continue;
      try{hit=await gsiSearch(q);}catch(e){}
      if(hit)break;
      await new Promise(r=>setTimeout(r,120));
    }
    if(hit){
      // 同一地点の重なり回避に微小オフセット
      const n=Object.values(geoCache).filter(c=>Math.abs(c.lat-hit.lat)<1e-4&&Math.abs(c.lng-hit.lng)<1e-4).length;
      if(n>0){hit={lat:hit.lat+0.0007*n,lng:hit.lng+0.0007*n};}
      geoCache[s.address]=hit;
      localStorage.setItem(LS_GEO,JSON.stringify(geoCache));
    }
    done++;
    document.getElementById("geoStatus").textContent=`位置情報を取得中… ${done}/${SITES.length}`;
    drawMarkers();
  }
  updateGeoStatus(true);
  fitAll();
}
function updateGeoStatus(final){
  const ok=SITES.filter(s=>coordOf(s)).length;
  const el=document.getElementById("geoStatus");
  if(final||ok===SITES.length){
    el.textContent=`表示中の物件：${filtered().filter(s=>coordOf(s)).length}件（位置取得 ${ok}/${SITES.length}）`;
  }
}

    ${[...new Set(list.map(s=>s.owner))].map(o=>{
      const g=list.filter(s=>s.owner===o), pct=g.length/list.length*100;
      return `<div class="bar-row"><span>${o.split(" ")[0]}</span><div class="bar-bg"><div class="bar" style="width:${pct}%;background:var(--volt)"></div></div><span class="bar-val">${g.length}件／MQ ${(g.reduce((a,s)=>a+(s.mq||0),0)/1e8).toFixed(2)}億</span></div>`;
    }).join("")}
  </div>`;
}

/* ================= 書き出し・読み込み ================= */
function dl(name,content,type){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();
}
function exportCSV(){
  const rows=[["物件名","所在地","都道府県","担当","土地フェーズ","電力フェーズ","土地価格","紹介手数料","PQ","MQ","商談ステータス","顧客名","メモ","地図URL"]];
  filtered().forEach(s=>{const d=getS(s.id);
    rows.push([s.name,s.address,s.pref,s.owner,s.landPhase,s.powerPhase,s.landPrice||"",s.fee||"",s.pq||"",s.mq||"",d.status,d.customer||"",d.memo||"",s.mapUrl]);});
  const csv="\uFEFF"+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  dl("蓄電池用地_営業一覧_"+new Date().toISOString().slice(0,10)+".csv",csv,"text/csv");
}
function exportJSON(){
  dl("蓄電池用地_商談データ_"+new Date().toISOString().slice(0,10)+".json",
     JSON.stringify({sales,geoFix},null,1),"application/json");
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const j=JSON.parse(r.result);
    if(j.sales){sales={...sales,...j.sales};saveSales();}
    if(j.geoFix){geoFix={...geoFix,...j.geoFix};localStorage.setItem(LS_FIX,JSON.stringify(geoFix));}
    render();alert("商談データを読み込みました。");
  }catch(e){alert("読み込みに失敗しました："+e.message);}};
  r.readAsText(f);
}

/* ================= 描画 ================= */
function render(){
  document.getElementById("fCount").textContent=`${filtered().length} / ${SITES.length} 件`;
  drawLegend();
  drawMarkers();
  refreshMarkerColors();
  if(curView==="list")drawTable();
  if(curView==="dash")drawDash();
}
initFilters();
render();
geocodeAll();
</script>
